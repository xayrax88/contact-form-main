<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Contact form</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Karla:ital,wght@0,200..800;1,200..800&family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Young+Serif&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="form-box">
    <form action="#" method="POST">
      <div class="form-content">

        <div class="grid-box">
          <h1 class="title">Contact Us</h1>

          <div class="first-name-block">
            <div class="first-name-label-box">
              <label class="first-name-label" for="firstName" name="firstName">First Name</label>
            </div>
            <input class="first-name-input border-color-grey-500" type="text" id="firstName" name="firstName" required>
            <p id="firstNameError" class="error-message hidden"></p>
          </div>

          <div class="last-name-block">
            <div class="last-name-label-box">
              <label class="last-name-label" for="lastName" name="lastName">Last Name</label>
            </div>
            <input class="last-name-input" type="text" for="lastName" id="lastName">
            <p id="lastNameError" class="error-message hidden"></p>
          </div>

          <div class="email-block">
            <div class="email-label-box">
              <label class="email-label" for="email" name="email">Email Address</label>
            </div>
            <input class="email-input" type="text" for="email" id="email">
            <p id="emailError" class="error-message hidden"></p>
          </div>

          <div class="contact-method-box" id="queryContainer">
            <fieldset>

              <legend><span>Query Type</span></legend>

              <label class="query-option general-option">
                <input class="general-input contact-method" type="radio" id="generalEnquiry" name="options" value="1">
                <span class="contact-method">General Enquiry</span>
              </label>
              <label class="query-option support-option">
                <input class="support-input contact-method" type="radio" id="supportRequest" name="options" value="2">
                <span class="contact-method">Support Request</span>
              </label>

            </fieldset>
            <p id="queryError" class="error-message hidden"></p>
          </div>

          <div class="message-box">
            <div class="msg-label-box">
              <label for="message"><span>Message</span></label>
            </div>
            <textarea class="msg-input-box" name="message" id="message" cols="30" rows="10" required></textarea>
            <p id="messageError" class="error-message hidden"></p>
          </div>


          <div class="checkbox-container">
            <input class="checkbox" id="checkBox" type="checkbox">
            <label class="checkbox-text" for="checkBox">
              I consent to being contacted by the team. *
            </label>
            <p id="checkboxError" class="error-message hidden"></p>
          </div>

          <div class="submit-box">
            <button type="submit" id="submitButton">
              <span class="submit-text">Submit</span>
            </button>
            <p id="emailError" class="error-message hidden"></p>
          </div>

        </div>



      </div>
    </form>
  </div>
  <!-- Contact Us

  First Name
  This field is required

  Last Name
  This field is required

  Email Address
  Please enter a valid email address
  This field is required

  Query Type
  General Enquiry
  Support Request
  Please select a query type

  Message
  This field is required

  I consent to being contacted by the team
  To submit this form, please consent to being contacted

  Submit

  Message Sent!
  Thanks for completing the form. We'll be in touch soon! -->

  <footer>
    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Anouxay Sichanh</a>.
    </div>
  </footer>
  <script src="/script.js"></script>
</body>

</html>
